name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC=build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 3600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k "$KC" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC" login.keychain

      - name: Store notary credentials
        env:
          AC_APPLE_ID: ${{ secrets.AC_APPLE_ID }}
          AC_TEAM_ID: ${{ secrets.AC_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials NOTARY_PROFILE \
            --apple-id "$AC_APPLE_ID" --team-id "$AC_TEAM_ID" --password "$AC_PASSWORD"

      - name: Build
        run: bash scripts/build.sh "${{ steps.v.outputs.version }}"

      - name: Sign, notarize, package
        env:
          DEV_ID_APP: ${{ secrets.DEV_ID_APP }}
          NOTARY_PROFILE: NOTARY_PROFILE
        run: bash scripts/package.sh "${{ steps.v.outputs.version }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Awake-${{ steps.v.outputs.version }}.zip
          generate_release_notes: true

# Required repo secrets:
#   CERT_P12_BASE64    base64 of your Developer ID Application .p12
#   CERT_PASSWORD      password for that .p12
#   KEYCHAIN_PASSWORD  any throwaway string for the temp CI keychain
#   AC_APPLE_ID        your Apple ID email
#   AC_TEAM_ID         your 10 char Team ID
#   AC_PASSWORD        an app specific password (appleid.apple.com)
#   DEV_ID_APP         "Developer ID Application: Your Name (TEAMID)"
#
# After the release publishes, copy the printed sha256 into the tap's
# Casks/awake.rb and push it to github.com/pistachionet/homebrew-awake.
