<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Awake. Close the lid. Keep work running.</title>
<meta name="description" content="A tiny macOS menu bar app that keeps your Mac awake while the lid is closed. For terminals, downloads, syncs, agents, and music.">
<meta property="og:title" content="Awake. Close the lid. Keep work running.">
<meta property="og:description" content="A tiny macOS menu bar app that keeps your Mac awake while the lid is closed.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://pistachionet.github.io/awake/">
<link rel="icon" href="images/appicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15110D; --bg2:#1E1914;
    --fg:#F3EEE5; --muted:#968B7D;
    --line:rgba(243,238,229,.10);
    --amber:#F2A93C; --glow:rgba(242,169,60,.45);
    --card:rgba(243,238,229,.04);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--fg);
    background:
      radial-gradient(1200px 600px at 50% -12%, rgba(242,169,60,.10), transparent 60%),
      linear-gradient(180deg, var(--bg2), var(--bg));
    min-height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:32px;
    -webkit-font-smoothing:antialiased;
  }
  main{width:100%; max-width:620px; text-align:center}

  .wordmark{
    display:inline-flex; align-items:center; gap:10px;
    font-weight:600; letter-spacing:-.01em; font-size:15px;
    color:var(--muted); margin-bottom:48px;
  }
  .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--amber);
    animation:breathe 4s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{opacity:.55; box-shadow:0 0 6px 1px var(--glow)}
    50%{opacity:1; box-shadow:0 0 16px 4px var(--glow)}
  }

  h1{
    font-family:"Bricolage Grotesque",system-ui,sans-serif;
    font-weight:700; line-height:1.04; letter-spacing:-.02em;
    font-size:clamp(2.3rem,7vw,4rem);
    margin-bottom:20px;
  }
  .sub{
    color:var(--muted); font-size:clamp(1rem,2.4vw,1.15rem);
    line-height:1.55; max-width:36ch; margin:0 auto 40px;
  }

  .cmd{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:14px 16px;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:clamp(.78rem,2.3vw,.92rem);
    text-align:left; margin-bottom:28px;
  }
  .cmd .prompt{color:var(--amber); user-select:none}
  .cmd code{flex:1; overflow-x:auto; white-space:nowrap; color:var(--fg)}
  .copy{
    flex-shrink:0; display:inline-flex; align-items:center; gap:6px;
    background:transparent; border:1px solid var(--line); color:var(--muted);
    border-radius:8px; padding:6px 10px; cursor:pointer; font:inherit; font-size:12px;
    transition:border-color .15s, color .15s;
  }
  .copy:hover{color:var(--fg); border-color:rgba(243,238,229,.28)}
  .copy svg{width:14px; height:14px}

  .actions{display:flex; gap:14px; justify-content:center; align-items:center; flex-wrap:wrap}
  .btn{
    text-decoration:none; font-weight:600; font-size:.95rem;
    padding:12px 22px; border-radius:10px;
    transition:transform .12s ease, background .15s, border-color .15s;
  }
  .btn-primary{background:var(--amber); color:#1A1206}
  .btn-primary:hover{transform:translateY(-1px); background:#F6B85A}
  .btn-ghost{color:var(--fg); border:1px solid var(--line)}
  .btn-ghost:hover{border-color:rgba(243,238,229,.28)}

  .meta{color:var(--muted); font-size:.82rem}
  .meta .sep{opacity:.4; margin:0 8px}
  .meta span{white-space:nowrap}

  .demo{
    border-radius:14px; overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 12px 40px rgba(0,0,0,.4);
    margin-bottom:40px;
  }
  .demo img{display:block; width:100%; height:auto}

  a{color:inherit}
  :focus-visible{outline:2px solid var(--amber); outline-offset:3px; border-radius:6px}

  @media (prefers-reduced-motion: reduce){
    .dot{animation:none; box-shadow:0 0 10px 2px var(--glow)}
    .btn,.copy{transition:none}
  }
</style>
</head>
<body>
  <main>
    <div class="wordmark"><span class="dot" aria-hidden="true"></span>awake</div>

    <h1>Close the lid.<br>Keep work running.</h1>

    <p class="sub">A tiny macOS menu bar app that keeps your Mac awake while the lid is closed. Built for terminals, downloads, syncs, coding agents, and music.</p>

    <div class="demo">
      <img src="images/awake-demo.gif" alt="Awake demo" loading="lazy">
    </div>

    <div class="cmd">
      <span class="prompt" aria-hidden="true">$</span>
      <code id="cmd">brew install --cask pistachionet/awake/awake</code>
      <button class="copy" id="copy" aria-label="Copy install command">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <span id="copytext">Copy</span>
      </button>
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="https://github.com/pistachionet/awake/releases/latest">Download for macOS</a>
      <a class="btn btn-ghost" href="https://github.com/pistachionet/awake">View on GitHub &rarr;</a>
    </div>
  </main>

  <script>
    const btn = document.getElementById('copy');
    const txt = document.getElementById('copytext');
    btn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(document.getElementById('cmd').textContent);
        txt.textContent = 'Copied';
        btn.style.color = 'var(--amber)';
        setTimeout(() => { txt.textContent = 'Copy'; btn.style.color = ''; }, 1500);
      } catch (e) {
        txt.textContent = 'Press \u2318C';
      }
    });
  </script>
</body>
</html>
